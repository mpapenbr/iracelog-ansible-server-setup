- name: Order servers
  hosts: localhost
  gather_facts: false

  roles:
    - hetzner/create

  tasks:
    - name: create local hosts file
      template: src=../hosts.yml.sample dest=../hosts.yml

  vars:
    # see https://docs.hetzner.com/de/cloud/ for more details about server types, locations and images
    hetzner_order_server_list:
      - hostname: server
        server_type: cx23
        server_location: hel1
        server_os: ubuntu-24.04
        subdomains:
          - server
          - traefik
          - iracelog
          - grpc
          - graphql
